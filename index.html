<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YourFeed</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0c; --card: #161616; --border: #242424; --accent: #ff4400;
    --text: #f0f0f0; --muted: #666; --muted2: #444;
    --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

.header {
position: sticky; top: 0; z-index: 50;
background: rgba(12,12,12,0.97);
backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
border-bottom: 1px solid var(–border); padding-top: var(–safe-top);
}
.header-inner { padding: 14px 16px 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { font-family: ‘Syne’, sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
.logo span { color: var(–accent); }
.header-btns { display: flex; gap: 8px; }
.icon-btn {
background: var(–card); border: 1px solid var(–border); color: var(–muted);
width: 36px; height: 36px; border-radius: 50%;
display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.icon-btn:active { opacity: 0.7; }
.icon-btn.spinning svg { animation: spin 0.8s linear infinite; }
.text-btn {
background: var(–card); border: 1px solid var(–border); color: var(–muted);
height: 36px; padding: 0 14px; border-radius: 20px;
font-size: 13px; font-family: ‘DM Sans’, sans-serif; cursor: pointer;
}
.add-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.add-bar input {
flex: 1; min-width: 0; background: var(–card); border: 1px solid var(–border); border-radius: 12px;
color: var(–text); font-family: ‘DM Sans’, sans-serif; font-size: 14px; padding: 10px 14px;
}
.add-bar input:focus { outline: none; border-color: var(–accent); }
.add-bar input::placeholder { color: var(–muted2); }
.add-btn {
background: var(–accent); color: white; border: none; border-radius: 12px;
font-family: ‘Syne’, sans-serif; font-weight: 700; font-size: 14px;
padding: 0 18px; cursor: pointer; flex-shrink: 0;
}
.add-btn:active { opacity: 0.8; }
.chips { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 12px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.chips::-webkit-scrollbar { display: none; }
.chip {
display: flex; align-items: center; gap: 6px; background: var(–card); border: 1px solid var(–border);
border-radius: 20px; padding: 5px 12px 5px 10px; font-size: 13px; white-space: nowrap;
cursor: pointer; flex-shrink: 0; color: var(–text);
}
.chip.active { border-color: var(–accent); background: #1e0800; color: var(–accent); }
.chip-all { background: var(–accent); border-color: var(–accent); color: white; padding: 5px 14px; font-weight: 600; }

.feed { padding: 12px 12px calc(24px + var(–safe-bottom)); display: flex; flex-direction: column; gap: 12px; }
.video-card {
background: var(–card); border: 1px solid var(–border); border-radius: 16px;
overflow: hidden; text-decoration: none; color: inherit; display: block; cursor: pointer;
}
.video-card:active { opacity: 0.8; }
.thumb { width: 100%; aspect-ratio: 16/9; background: #1a1a1a; position: relative; overflow: hidden; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.new-badge {
position: absolute; top: 8px; left: 8px; background: var(–accent); color: white;
font-size: 10px; font-weight: 700; font-family: ‘Syne’, sans-serif; padding: 2px 8px; border-radius: 6px;
}
.duration-badge {
position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); color: white;
font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 5px; font-family: ‘Syne’, sans-serif;
}
.play-icon {
position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s;
}
.video-card:hover .play-icon { opacity: 1; }
.play-circle {
width: 52px; height: 52px; border-radius: 50%; background: rgba(0,0,0,0.7);
display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.4);
}
.card-body { padding: 11px 14px 13px; }
.card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.card-ch { font-size: 12px; color: var(–muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-time { font-size: 12px; color: var(–muted2); flex-shrink: 0; }
.card-title { font-size: 15px; font-weight: 500; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 32px; text-align: center; gap: 10px; }
.state-icon { font-size: 44px; opacity: 0.25; }
.state-title { font-family: ‘Syne’, sans-serif; font-size: 18px; font-weight: 700; color: var(–muted); }
.state-body { font-size: 14px; color: var(–muted); line-height: 1.6; opacity: 0.7; }
.spinner { width: 30px; height: 30px; border: 2px solid var(–border); border-top-color: var(–accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: flex-end; }
.overlay.open { display: flex; }
.sheet { background: #1c1c1c; border-radius: 20px 20px 0 0; padding: 16px 16px calc(24px + var(–safe-bottom)); width: 100%; max-height: 75vh; overflow-y: auto; }
.sheet-handle { width: 36px; height: 4px; background: var(–muted2); border-radius: 2px; margin: 0 auto 18px; }
.sheet-title { font-family: ‘Syne’, sans-serif; font-weight: 800; font-size: 18px; margin-bottom: 14px; }
.sheet-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(–border); }
.sheet-name { flex: 1; font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sheet-id { font-size: 11px; color: var(–muted); font-family: monospace; }
.del-btn { background: #2a1010; border: none; color: #ff6644; font-size: 12px; font-family: ‘DM Sans’, sans-serif; padding: 6px 12px; border-radius: 8px; cursor: pointer; flex-shrink: 0; }

/* PLAYER */
.player-wrap { display: none; position: fixed; inset: 0; z-index: 200; background: #000; flex-direction: column; touch-action: none; }
.player-wrap.open { display: flex; }
.player-header {
position: absolute; top: 0; left: 0; right: 0;
padding: calc(var(–safe-top) + 14px) 16px 14px;
display: flex; align-items: center; justify-content: space-between; z-index: 10;
background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
}
.player-close {
background: rgba(0,0,0,0.5); border: none; color: white;
width: 36px; height: 36px; border-radius: 50%;
display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px;
}
.player-counter { font-size: 13px; color: rgba(255,255,255,0.7); font-family: ‘Syne’, sans-serif; font-weight: 700; }
.player-yt-btn {
background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white;
font-size: 12px; font-family: ‘DM Sans’, sans-serif; padding: 6px 12px; border-radius: 20px;
cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 5px;
}
.player-slide { position: absolute; inset: 0; display: flex; flex-direction: column; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
.player-video { width: 100%; aspect-ratio: 16/9; position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-55%); background: #000; }
.player-video iframe { width: 100%; height: 100%; border: none; display: block; }
.player-info {
position: absolute; bottom: 0; left: 0; right: 0;
padding: 20px 20px calc(var(–safe-bottom) + 60px);
background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
}
.player-channel { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
.player-title { font-size: 17px; font-weight: 600; line-height: 1.35; color: white; margin-bottom: 8px; }
.player-date { font-size: 12px; color: rgba(255,255,255,0.4); }
.swipe-hint {
position: absolute; bottom: calc(var(–safe-bottom) + 16px); left: 50%; transform: translateX(-50%);
display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.5; pointer-events: none;
animation: hintFade 2s ease 1.5s both;
}
@keyframes hintFade { 0%{opacity:0.5} 70%{opacity:0.5} 100%{opacity:0} }
.swipe-hint span { font-size: 11px; color: white; letter-spacing: 0.05em; }

/* PLAYER THUMB */
.player-thumb-wrap {
width: 100%; aspect-ratio: 16/9;
position: absolute; top: 50%; left: 0; right: 0;
transform: translateY(-55%);
background: #000; overflow: hidden;
}
.player-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.player-thumb-overlay {
position: absolute; inset: 0;
display: flex; flex-direction: column; align-items: center; justify-content: center;
gap: 14px; background: rgba(0,0,0,0.35);
}
.play-big-btn {
width: 72px; height: 72px; border-radius: 50%;
background: #ff0000; border: none; cursor: pointer;
display: flex; align-items: center; justify-content: center;
box-shadow: 0 4px 24px rgba(255,0,0,0.5);
transition: transform 0.15s;
}
.play-big-btn:active { transform: scale(0.93); }
.open-yt-label {
color: white; font-size: 13px; font-family: ‘DM Sans’, sans-serif;
background: rgba(0,0,0,0.5); padding: 5px 14px; border-radius: 20px;
border: 1px solid rgba(255,255,255,0.2);
}

.toast {
position: fixed; bottom: calc(24px + var(–safe-bottom)); left: 50%;
transform: translateX(-50%) translateY(60px);
background: #1e1e1e; border: 1px solid var(–border); color: var(–text);
font-size: 13px; padding: 10px 20px; border-radius: 20px;
white-space: nowrap; z-index: 300; transition: transform 0.25s; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">Your<span>Feed</span></div>
      <div class="header-btns">
<button class="text-btn" onclick="openSheet()">Channels</button>
        <button class="icon-btn" id="refreshBtn" onclick="refreshAll()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="add-bar">
      <input id="channelInput" type="text" placeholder="Paste UC code (UCxxxxxx…) or @handle" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button class="add-btn" onclick="addChannel()">Add</button>
    </div>
  </div>
  <div class="chips" id="chips"></div>
</div>

<div class="feed" id="feed"></div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">My Channels</div>
    <div id="sheetList"></div>
  </div>
</div>

<div class="player-wrap" id="playerWrap">
  <div class="player-header">
    <button class="player-close" onclick="closePlayer()">✕</button>
    <div class="player-counter" id="playerCounter"></div>
    <a class="player-yt-btn" id="playerYtBtn" target="_blank" rel="noopener">▶ YouTube</a>
  </div>
  <div class="player-slide" id="playerSlide">
    <div class="player-thumb-wrap" id="playerThumb"></div>
    <div class="player-info">
      <div class="player-channel" id="playerChannel"></div>
      <div class="player-title" id="playerTitle"></div>
      <div class="player-date" id="playerDate"></div>
    </div>
  </div>
  <div class="swipe-hint" id="swipeHint">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    <span>SWIPE UP FOR NEXT</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API_KEY = 'AIzaSyCpjjCkDQJRVRwKaRIqiEBHHhkAUiC4PtI';
var YT_API  = 'https://www.googleapis.com/youtube/v3';

// ── STORAGE ───────────────────────────────────────────────────────────────────
function saveChannels(chs) {
  var s = JSON.stringify(chs);
  try { localStorage.setItem('yf_ch', s); } catch(e) {}
  try {
    var exp = new Date(Date.now() + 365*864e5).toUTCString();
    document.cookie = 'yf_ch=' + encodeURIComponent(s) + ';expires=' + exp + ';path=/;SameSite=Lax';
  } catch(e) {}
}
function loadChannels() {
  try { var v = localStorage.getItem('yf_ch'); if (v) return JSON.parse(v); } catch(e) {}
  try {
    var m = document.cookie.match(/(?:^|;\s*)yf_ch=([^;]*)/);
    if (m) return JSON.parse(decodeURIComponent(m[1]));
  } catch(e) {}
  return null;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
var channels = loadChannels() || [];
var videos   = [];
var filter   = null;
var loading  = false;

// ── BOOT ──────────────────────────────────────────────────────────────────────
renderChips(); renderFeed();
if (channels.length > 0) fetchAll();

// ── YOUTUBE API HELPERS ───────────────────────────────────────────────────────

// Parse ISO 8601 duration (PT4M13S) to total seconds
function parseDuration(iso) {
  var m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return ((parseInt(m[1])||0)*3600) + ((parseInt(m[2])||0)*60) + (parseInt(m[3])||0);
}

// Format seconds to mm:ss or h:mm:ss
function fmtDuration(secs) {
  var h = Math.floor(secs/3600);
  var m = Math.floor((secs%3600)/60);
  var s = secs%60;
  if (h > 0) return h + ':' + pad(m) + ':' + pad(s);
  return m + ':' + pad(s);
}
function pad(n) { return n < 10 ? '0'+n : ''+n; }

// Resolve a UC channel ID from a handle like @alexhormozi or channel name
async function apiGet(url) {
  var res = await fetch(url, { referrerPolicy: 'no-referrer' });
  var d   = await res.json();
  if (d.error) {
    var reason = (d.error.errors && d.error.errors[0] && d.error.errors[0].reason) || '';
    if (reason === 'quotaExceeded') {
      toast('⚠️ API daily limit reached — try again tomorrow');
    } else if (reason === 'keyInvalid' || d.error.code === 400) {
      toast('⚠️ API key issue — check Google Cloud Console');
    } else if (d.error.code === 403) {
      toast('⚠️ API key is restricted — go to Google Cloud → Credentials → remove HTTP referrer restrictions');
    } else {
      toast('API error ' + d.error.code + ': ' + (d.error.message || ''));
    }
    console.warn('API error:', d.error);
    throw new Error('API error: ' + d.error.message);
  }
  return d;
}

async function resolveChannelId(input) {
  input = input.trim();

  // Already a UC id
  if (/^UC[a-zA-Z0-9_-]{10,}$/.test(input)) return input;

  var query = input.replace(/^@/, '');

  // Try handle lookup first
  try {
    var d = await apiGet(YT_API + '/channels?part=id&forHandle=' + encodeURIComponent(query) + '&key=' + API_KEY);
    if (d.items && d.items.length) return d.items[0].id;
  } catch(e) { console.warn('handle lookup failed', e.message); return null; }

  // Fall back to search
  try {
    var d2 = await apiGet(YT_API + '/search?part=snippet&type=channel&q=' + encodeURIComponent(query) + '&maxResults=1&key=' + API_KEY);
    if (d2.items && d2.items.length) return d2.items[0].snippet.channelId;
  } catch(e) { console.warn('search fallback failed', e.message); return null; }

  return null;
}

// Fetch latest videos for a channel, filter out shorts (<= 60s)
async function fetchOne(ch) {
  try {
    // 1. Get latest 25 video IDs from the channel
    var searchUrl = YT_API + '/search?part=snippet&channelId=' + ch.id +
      '&type=video&order=date&maxResults=25&key=' + API_KEY;
    var sData = await apiGet(searchUrl);
    if (!sData.items || !sData.items.length) return false;

    var ids = sData.items.map(function(i){ return i.id.videoId; }).join(',');

    // 2. Get durations + details for those videos
    var detailUrl = YT_API + '/videos?part=contentDetails,snippet&id=' + ids + '&key=' + API_KEY;
    var dData = await apiGet(detailUrl);
    if (!dData.items) return false;

    // Update channel name
    var chanName = ch.name;
    if (sData.items[0] && sData.items[0].snippet && sData.items[0].snippet.channelTitle) {
      chanName = sData.items[0].snippet.channelTitle;
    }
    var idx = channels.findIndex(function(c){ return c.id === ch.id; });
    if (idx !== -1 && chanName !== ch.id) { channels[idx].name = chanName; saveChannels(channels); }

    var normalized = dData.items.map(function(item) {
      var secs = parseDuration(item.contentDetails.duration || 'PT0S');
      return {
        channelId:   ch.id,
        channelName: chanName || ch.name || ch.id,
        title:       item.snippet.title,
        link:        'https://www.youtube.com/watch?v=' + item.id,
        videoId:     item.id,
        thumb:       (item.snippet.thumbnails.medium || item.snippet.thumbnails.default || {}).url || '',
        pub:         new Date(item.snippet.publishedAt),
        duration:    secs,
        durationFmt: fmtDuration(secs),
      };
    }).filter(function(v) {
      // Filter out anything 60 seconds or under (Shorts)
      if (v.duration <= 60) return false;
      // Also filter by title tag just in case
      if (/#shorts?\b/i.test(v.title)) return false;
      return true;
    });

    if (!normalized.length) return false;
    videos = videos.filter(function(v){ return v.channelId !== ch.id; }).concat(normalized);
    videos.sort(function(a,b){ return b.pub - a.pub; });
    return true;
  } catch(e) {
    console.warn('fetchOne failed', ch.id, e.message);
    return false;
  }
}

async function fetchAll() {
  if (loading) return;
  loading = true; spin(true); videos = []; renderFeed();
  await Promise.all(channels.map(fetchOne));
  loading = false; spin(false); renderChips(); renderFeed();
}

async function fetchAndAdd(ch) {
  spin(true);
  var ok = await fetchOne(ch);
  spin(false); renderChips(); renderFeed();
  if (ok) {
    toast('✓ Added ' + ((channels.find(function(c){ return c.id===ch.id; })||{}).name || ch.id));
  } else {
    toast('Could not load channel — check and try again');
    channels = channels.filter(function(c){ return c.id !== ch.id; });
    saveChannels(channels); renderChips(); renderFeed();
  }
}

function spin(on) { document.getElementById('refreshBtn').classList.toggle('spinning', on); }
function refreshAll() { if (!channels.length) { toast('Add a channel first!'); return; } fetchAll(); }

// ── ADD CHANNEL ───────────────────────────────────────────────────────────────
async function addChannel() {
  var input = document.getElementById('channelInput');
  var raw   = (input.value || '').trim().replace(/\s+/g, '');
  if (!raw) { input.focus(); return; }

  // Extract UC id from anywhere — handles full URLs, @handles, or raw UC codes
  var ucMatch = raw.match(/UC[a-zA-Z0-9_-]{10,}/);
  var id = ucMatch ? ucMatch[0] : null;

  // If no UC id found, try API lookup
  if (!id) {
    toast('Looking up channel…');
    try { id = await resolveChannelId(raw); } catch(e) { id = null; }
  }

  if (!id) {
    toast('Paste the UC code instead (starts with UC…)');
    input.value = raw; // restore so they can try again
    return;
  }

  if (channels.find(function(c){ return c.id === id; })) {
    toast('Already in your feed!');
    input.value = '';
    return;
  }

  input.value = '';
  input.blur();

  var ch = { id: id, name: raw.replace(/^@/,'').replace(/.*channel\//,'') };
  channels.push(ch);
  saveChannels(channels);
  renderChips();
  renderFeed();
  toast('Loading videos…');
  await fetchAndAdd(ch);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderChips() {
  var el = document.getElementById('chips');
  if (!channels.length) { el.innerHTML = ''; return; }
  el.innerHTML =
    '<div class="chip chip-all' + (filter===null?' active':'') + '" onclick="setFilter(null)">All</div>' +
    channels.map(function(ch) {
      return '<div class="chip' + (filter===ch.id?' active':'') + '" onclick="setFilter(\'' + ch.id + '\')">' + esc(ch.name||ch.id) + '</div>';
    }).join('');
}

function setFilter(id) { filter = id; renderChips(); renderFeed(); }

function getVisible() {
  return filter ? videos.filter(function(v){ return v.channelId === filter; }) : videos;
}

function renderFeed() {
  var el  = document.getElementById('feed');
  var vis = getVisible();
  if (!channels.length) {
    el.innerHTML = '<div class="state"><div class="state-icon">📺</div><div class="state-title">No channels yet</div><div class="state-body">Type a channel name, @handle, or UC code and tap Add.</div></div>';
    return;
  }
  if (!vis.length) {
    el.innerHTML = loading
      ? '<div class="state"><div class="spinner"></div><div class="state-title" style="margin-top:10px">Loading videos…</div></div>'
      : '<div class="state"><div class="state-icon">⚠️</div><div class="state-title">No videos loaded</div><div class="state-body">Tap refresh to try again.</div></div>';
    return;
  }
  var now = Date.now();
  el.innerHTML = vis.map(function(v, i) {
    var isNew = (now - v.pub) < 48*3600*1000;
    return '<div class="video-card" onclick="openPlayer(' + i + ')">' +
      '<div class="thumb">' +
        '<img src="' + v.thumb + '" loading="lazy" onerror="this.style.display=\'none\'">' +
        (isNew ? '<div class="new-badge">NEW</div>' : '') +
        '<div class="duration-badge">' + v.durationFmt + '</div>' +
        '<div class="play-icon"><div class="play-circle"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div></div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-meta"><div class="card-ch">' + esc(v.channelName) + '</div><div class="card-time">' + ago(v.pub) + '</div></div>' +
        '<div class="card-title">' + esc(v.title) + '</div>' +
      '</div></div>';
  }).join('');
}

// ── PLAYER ────────────────────────────────────────────────────────────────────
var playerIdx = 0;
var touchStartY = 0;
var dragging = false;
var dragY = 0;

function openPlayer(idx) {
  playerIdx = idx;
  document.getElementById('playerWrap').classList.add('open');
  document.body.style.overflow = 'hidden';
  loadPlayerVideo(playerIdx);
  var hint = document.getElementById('swipeHint');
  hint.style.animation = 'none';
  setTimeout(function(){ hint.style.animation = ''; }, 10);
}

function closePlayer() {
  document.getElementById('playerWrap').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('playerThumb').innerHTML = '';
}

function loadPlayerVideo(idx) {
  var vis = getVisible();
  if (idx < 0 || idx >= vis.length) return;
  var v = vis[idx];
  document.getElementById('playerCounter').textContent = (idx+1) + ' / ' + vis.length;
  document.getElementById('playerChannel').textContent = v.channelName;
  document.getElementById('playerTitle').textContent   = v.title;
  document.getElementById('playerDate').textContent    = ago(v.pub) + '  ·  ' + v.durationFmt;
  document.getElementById('playerYtBtn').href          = v.link;

  // Show thumbnail with big play button — tapping opens YouTube app
  var hqThumb = 'https://img.youtube.com/vi/' + v.videoId + '/hqdefault.jpg';
  document.getElementById('playerThumb').innerHTML =
    '<img src="' + hqThumb + '" onerror="this.src='' + v.thumb + ''">' +
    '<div class="player-thumb-overlay">' +
      '<button class="play-big-btn" onclick="openInYouTube()">' +
        '<svg width="28" height="28" viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>' +
      '</button>' +
      '<div class="open-yt-label">Tap to watch</div>' +
    '</div>';
}

function openInYouTube() {
  var vis = getVisible();
  var v = vis[playerIdx];
  // Try YouTube app deep link first, fall back to web
  window.location.href = 'youtube://watch?v=' + v.videoId;
  setTimeout(function() {
    window.open('https://www.youtube.com/watch?v=' + v.videoId, '_blank');
  }, 500);
}

function playerNext() {
  var vis = getVisible();
  if (playerIdx < vis.length - 1) { playerIdx++; animateSlide('up'); }
  else toast('Last video!');
}
function playerPrev() {
  if (playerIdx > 0) { playerIdx--; animateSlide('down'); }
  else toast('First video!');
}
function animateSlide(dir) {
  var slide = document.getElementById('playerSlide');
  var vis = getVisible();
  var v = vis[playerIdx];
  // Update info immediately
  document.getElementById('playerCounter').textContent = (playerIdx+1) + ' / ' + vis.length;
  document.getElementById('playerChannel').textContent = v.channelName;
  document.getElementById('playerTitle').textContent   = v.title;
  document.getElementById('playerDate').textContent    = ago(v.pub) + '  ·  ' + v.durationFmt;
  document.getElementById('playerYtBtn').href          = v.link;
  // Slide out
  slide.style.transition = 'transform 0.32s cubic-bezier(0.4,0,0.2,1)';
  slide.style.transform  = 'translateY(' + (dir==='up'?'-100%':'100%') + ')';
  setTimeout(function() {
    slide.style.transition = 'none';
    slide.style.transform  = 'translateY(' + (dir==='up'?'100%':'-100%') + ')';
    var hqThumb = 'https://img.youtube.com/vi/' + v.videoId + '/hqdefault.jpg';
    document.getElementById('playerThumb').innerHTML =
      '<img src="' + hqThumb + '" onerror="this.src='' + v.thumb + ''">' +
      '<div class="player-thumb-overlay">' +
        '<button class="play-big-btn" onclick="openInYouTube()">' +
          '<svg width="28" height="28" viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>' +
        '</button>' +
        '<div class="open-yt-label">Tap to watch</div>' +
      '</div>';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        slide.style.transition = 'transform 0.32s cubic-bezier(0.4,0,0.2,1)';
        slide.style.transform  = 'translateY(0)';
      });
    });
  }, 320);
}

var pw = document.getElementById('playerWrap');
pw.addEventListener('touchstart', function(e){ touchStartY=e.touches[0].clientY; dragging=true; dragY=0; }, {passive:true});
pw.addEventListener('touchmove',  function(e){
  if (!dragging) return;
  dragY = e.touches[0].clientY - touchStartY;
  var slide = document.getElementById('playerSlide');
  slide.style.transition = 'none';
  slide.style.transform  = 'translateY(' + (dragY*0.4) + 'px)';
}, {passive:true});
pw.addEventListener('touchend', function(){
  if (!dragging) return; dragging = false;
  var slide = document.getElementById('playerSlide');
  slide.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
  slide.style.transform  = 'translateY(0)';
  if (dragY < -60) playerNext();
  else if (dragY > 60) playerPrev();
});

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('playerWrap').classList.contains('open')) return;
  if (e.key==='ArrowUp'||e.key==='ArrowRight') playerNext();
  if (e.key==='ArrowDown'||e.key==='ArrowLeft') playerPrev();
  if (e.key==='Escape') closePlayer();
});

// ── CHANNEL SHEET ─────────────────────────────────────────────────────────────
function openSheet() {
  var el = document.getElementById('sheetList');
  el.innerHTML = !channels.length
    ? '<p style="color:var(--muted);font-size:14px;padding:8px 0">No channels added yet.</p>'
    : channels.map(function(ch) {
        return '<div class="sheet-row">' +
          '<div><div class="sheet-name">' + esc(ch.name||ch.id) + '</div><div class="sheet-id">' + ch.id + '</div></div>' +
          '<button class="del-btn" onclick="removeChannel(\'' + ch.id + '\')">Remove</button></div>';
      }).join('');
  document.getElementById('overlay').classList.add('open');
}
function closeSheet() { document.getElementById('overlay').classList.remove('open'); }
function removeChannel(id) {
  channels = channels.filter(function(c){ return c.id!==id; });
  saveChannels(channels);
  videos = videos.filter(function(v){ return v.channelId!==id; });
  if (filter===id) filter=null;
  openSheet(); renderChips(); renderFeed();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function ago(date) {
  var s = Math.floor((Date.now()-date)/1000);
  if (s<3600)  return Math.floor(s/60)+'m ago';
  if (s<86400) return Math.floor(s/3600)+'h ago';
  var d=Math.floor(s/86400);
  if (d<7)  return d+'d ago';
  if (d<31) return Math.floor(d/7)+'w ago';
  if (d<365) return Math.floor(d/30)+'mo ago';
  return new Date(date).toLocaleDateString();
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(function(){ el.classList.remove('show'); },3000);
}
document.getElementById('channelInput').addEventListener('keydown', function(e){ if(e.key==='Enter') addChannel(); });
</script>
